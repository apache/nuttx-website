<!-- DEMO SHOWCASE SECTION -->
<section class="demo-section-static">
  <div class="section-container">
    <div class="demo-static-grid">
      <div class="demo-static-content">
        <h2 class="demo-title">{{ site.data.homepage.demo.title }}</h2>
        <p class="demo-description">{{ site.data.homepage.demo.description }}</p>
      </div>
      <a href="{{ site.baseurl }}{{ site.data.homepage.demo.url }}" class="demo-static-preview">
        <div class="terminal-window">
          <div class="terminal-header">
            <div class="terminal-buttons">
              <span class="terminal-button"></span>
              <span class="terminal-button"></span>
              <span class="terminal-button"></span>
            </div>
            <div class="terminal-title">{{ site.data.homepage.demo.terminal_title }}</div>
          </div>
          <div class="terminal-body">
            <pre class="terminal-code">NuttShell (NSH) {{ site.data.homepage.demo.terminal_version }}
nsh> <span class="cursor">█</span></pre>
          </div>
          <div class="demo-overlay">
            <img src="{{ site.baseurl }}/static/icons/play.svg" class="play-icon" width="32" height="32" alt="Play">
            <span class="overlay-text">Launch Interactive Demo</span>
          </div>
        </div>
      </a>
    </div>
  </div>
</section>
