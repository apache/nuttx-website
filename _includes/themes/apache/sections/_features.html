<!-- FEATURE HIGHLIGHTS SECTION -->
<section class="features-section">
  <div class="section-container">
    <div class="section-header">
      <h2 class="section-title">{{ site.data.homepage.features.title }}</h2>
      <p class="section-subtitle">{{ site.data.homepage.features.subtitle }}</p>
    </div>
    
    <div class="feature-grid">
      {% for feature in site.data.homepage.features.items %}
      <div class="feature-card">
        <div class="feature-card-header">
          <div class="feature-icon">
            <img src="{{ site.baseurl }}/static/icons/{{ feature.icon }}" alt="{{ feature.title }}" width="24" height="24">
          </div>
          <h3 class="feature-title">{{ feature.title }}</h3>
        </div>
        <p class="feature-description">{{ feature.description }}</p>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
