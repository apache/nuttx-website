<!-- DOCUMENTATION SECTION -->
<section class="resources-section">
  <div class="section-container">
    <div class="section-header">
      <h2 class="section-title">{{ site.data.homepage.documentation.title }}</h2>
      <p class="section-subtitle">{{ site.data.homepage.documentation.subtitle }}</p>
    </div>
    
    <div class="resource-grid">
      {% for resource in site.data.homepage.documentation.resources %}
      <a href="{% if resource.external %}{{ resource.url }}{% else %}{{ site.baseurl }}{{ resource.url }}{% endif %}" class="resource-card"{% if resource.external %} target="_blank" rel="noopener noreferrer"{% endif %}>
        <div class="resource-card-header">
          <div class="resource-icon">
            <img src="{{ site.baseurl }}/static/icons/{{ resource.icon }}" alt="{{ resource.title }}" width="24" height="24">
          </div>
          <h3 class="resource-title">{{ resource.title }}</h3>
        </div>
        <p class="resource-description">{{ resource.description }}</p>
      </a>
      {% endfor %}
    </div>
  </div>
</section>
