<!-- COMPANIES CAROUSEL SECTION -->
<section class="companies-section">
  <div class="section-container">
    <h2 class="section-title-center">{{ site.data.homepage.companies.title }}</h2>
    <div class="carousel-wrapper">
      <div class="carousel-track">
        {% for company in site.data.homepage.companies.logos %}
        <div class="carousel-slide">
          <a href="{{ company.url }}" {% if company.url contains '://' %}target="_blank" rel="noopener noreferrer"{% endif %} class="company-logo-container">
            <img src="{{ site.baseurl }}/static/companies/{{ company.image }}" alt="{{ company.name }}" class="company-logo-img">
          </a>
        </div>
        {% endfor %}
        <!-- Duplicate slides for seamless loop -->
        {% for company in site.data.homepage.companies.logos %}
        <div class="carousel-slide">
          <a href="{{ company.url }}" {% if company.url contains '://' %}target="_blank" rel="noopener noreferrer"{% endif %} class="company-logo-container">
            <img src="{{ site.baseurl }}/static/companies/{{ company.image }}" alt="{{ company.name }}" class="company-logo-img">
          </a>
        </div>
        {% endfor %}
      </div>
    </div>
  </div>
</section>
